name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
    branches:
      - main       # automatic pre-release on every push to main
  workflow_dispatch:
    inputs:
      version:
        description: "Version to release (e.g. 1.2.3 — without the 'v' prefix)"
        required: true
        default: "1.0.0"

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true
  PROJECT_PATH: MTRCSLib/MTRCS/MTRCS.csproj

jobs:
  # ─────────────────────────────────────────────────────────────────────────────
  # Build each platform artifact
  # ─────────────────────────────────────────────────────────────────────────────
  build:
    name: Build · ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # ── Windows x64 (Native AOT) ──────────────────────────────────────────
          - name: Windows x64
            os: windows-latest
            rid: win-x64
            archive_ext: zip
            aot: true

          # ── macOS Apple Silicon (Native AOT) ─────────────────────────────────
          - name: macOS Apple Silicon
            os: macos-14
            rid: osx-arm64
            archive_ext: tar.gz
            aot: true

          # ── Linux x64 (Native AOT) ───────────────────────────────────────────
          - name: Linux x64
            os: ubuntu-latest
            rid: linux-x64
            archive_ext: tar.gz
            aot: true

          # ── Linux ARM64 (Native AOT — GitHub ARM64 runner) ───────────────────
          - name: Linux ARM64
            os: ubuntu-24.04-arm
            rid: linux-arm64
            archive_ext: tar.gz
            aot: true

          # ── Raspberry Pi / Linux ARMv7 (self-contained, cross-compiled) ──────
          - name: Raspberry Pi (ARMv7)
            os: ubuntu-latest
            rid: linux-arm
            archive_ext: tar.gz
            aot: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Determine release version from tag, branch push, or manual input
      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"   # strip leading 'v' from tag
          else
            # Auto pre-release version for push to main: 0.YYYYMMDD.<run_number>-pre
            VERSION="0.$(date -u +%Y%m%d).${{ github.run_number }}-pre"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"    >> "$GITHUB_OUTPUT"

      # ── Platform-specific prerequisites ───────────────────────────────────────

      - name: Install native AOT prerequisites (Linux x64)
        if: runner.os == 'Linux' && matrix.aot == true && matrix.rid == 'linux-x64'
        run: sudo apt-get update -y && sudo apt-get install -y clang zlib1g-dev

      - name: Install native AOT prerequisites (Linux ARM64)
        if: runner.os == 'Linux' && matrix.aot == true && matrix.rid == 'linux-arm64'
        run: sudo apt-get update -y && sudo apt-get install -y clang zlib1g-dev

      # ── Publish ───────────────────────────────────────────────────────────────

      - name: Publish (Native AOT)
        if: matrix.aot == true
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=true
          -p:StripSymbols=true
          -p:Version=${{ steps.version.outputs.version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}+${{ github.run_number }}
          --output publish/${{ matrix.rid }}

      - name: Publish (Self-contained, trimmed — cross-compile)
        if: matrix.aot == false
        run: >
          dotnet publish ${{ env.PROJECT_PATH }}
          --configuration Release
          --runtime ${{ matrix.rid }}
          --self-contained true
          -p:PublishAot=false
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -p:Version=${{ steps.version.outputs.version }}
          -p:InformationalVersion=${{ steps.version.outputs.version }}+${{ github.run_number }}
          --output publish/${{ matrix.rid }}

      # ── Archive ───────────────────────────────────────────────────────────────

      - name: Archive (zip — Windows)
        if: matrix.archive_ext == 'zip'
        shell: pwsh
        run: |
          $src  = "publish/${{ matrix.rid }}"
          $dest = "mtrcs-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.zip"
          Compress-Archive -Path "$src\*" -DestinationPath $dest
          echo "ARTIFACT=$dest" | Out-File -FilePath $Env:GITHUB_ENV -Append

      - name: Archive (tar.gz — Unix)
        if: matrix.archive_ext == 'tar.gz'
        shell: bash
        run: |
          DEST="mtrcs-${{ steps.version.outputs.tag }}-${{ matrix.rid }}.tar.gz"
          tar -czf "$DEST" -C "publish/${{ matrix.rid }}" .
          echo "ARTIFACT=$DEST" >> "$GITHUB_ENV"

      # ── Upload artifact for the release job ───────────────────────────────────

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mtrcs-${{ matrix.rid }}
          path: ${{ env.ARTIFACT }}
          retention-days: 1

  # ─────────────────────────────────────────────────────────────────────────────
  # Create GitHub Release and attach all artifacts
  # ─────────────────────────────────────────────────────────────────────────────
  release:
    name: Create GitHub Release
    needs: build
    # Run even if some build jobs failed so partial artifacts are still released;
    # skip only if the entire build matrix was cancelled.
    if: ${{ always() && !cancelled() && !contains(needs.build.result, 'cancelled') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          elif [[ "$GITHUB_REF" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF_NAME#v}"
          else
            VERSION="0.$(date -u +%Y%m%d).${{ github.run_number }}-pre"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}"    >> "$GITHUB_OUTPUT"

      - name: Download all artifacts
        uses: actions/download-artifact@v4.1.8
        with:
          path: dist
          merge-multiple: true

      - name: List artifacts
        run: ls -lh dist/

      - name: Generate checksums
        id: checksums
        run: |
          cd dist
          find . -maxdepth 1 -type f \( -name '*.zip' -o -name '*.tar.gz' \) \
            | sort | xargs -r sha256sum | sed 's|^\([a-f0-9]*\)  \./|\1  |' \
            > checksums.sha256.txt
          echo "--- Checksums ---"
          cat checksums.sha256.txt

      - name: Generate release notes
        id: notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          REPO="${{ github.repository }}"

          # ── Find the previous release tag ─────────────────────────────────────
          git fetch --tags --quiet
          PREV_TAG=$(git tag --sort=-version:refname | grep -v "^${TAG}$" | head -1)
          if [ -n "$PREV_TAG" ]; then
            RANGE="${PREV_TAG}..HEAD"
            RANGE_DISPLAY="since ${PREV_TAG}"
          else
            RANGE="HEAD"
            RANGE_DISPLAY="(initial release)"
          fi

          # ── Collect commits (no merges) ────────────────────────────────────────
          # Format: 40-char SHA followed by a space then the subject line.
          # Using fixed-width SHA avoids any delimiter collision with commit text.
          mapfile -t COMMIT_LINES < <(git log "$RANGE" --pretty=format:"%H %s" --no-merges 2>/dev/null || true)

          # ── Build categorised commit list & summary counters ───────────────────
          FEAT_COUNT=0; FIX_COUNT=0; OTHER_COUNT=0
          COMMITS_MD=""
          ISSUE_NUMS=""
          for LINE in "${COMMIT_LINES[@]}"; do
            SHA="${LINE:0:40}"
            MSG="${LINE:41}"
            SHORT="${SHA:0:7}"
            LINK="https://github.com/${REPO}/commit/${SHA}"
            COMMITS_MD="${COMMITS_MD}- ${MSG} [\`${SHORT}\`](${LINK})\n"
            case "$MSG" in
              feat*|add*|new*)  FEAT_COUNT=$((FEAT_COUNT+1)) ;;
              fix*|bug*|patch*) FIX_COUNT=$((FIX_COUNT+1)) ;;
              *)                OTHER_COUNT=$((OTHER_COUNT+1)) ;;
            esac
            # collect issue references — require # to follow whitespace or line-start
            # to avoid matching URL anchors (e.g. github.com/page#section)
            REFS=$(echo "$MSG" | grep -oE '(^| )#[0-9]+' | grep -oE '[0-9]+' || true)
            for N in $REFS; do ISSUE_NUMS="${ISSUE_NUMS} ${N}"; done
          done

          TOTAL=${#COMMIT_LINES[@]}

          # ── Build human-readable summary paragraph ─────────────────────────────
          if [ "$TOTAL" -eq 0 ]; then
            SUMMARY="No code changes in this release."
          else
            PARTS=""
            [ "$FEAT_COUNT"  -gt 0 ] && PARTS="${PARTS}, ${FEAT_COUNT} new feature$([ $FEAT_COUNT  -gt 1 ] && echo s)"
            [ "$FIX_COUNT"   -gt 0 ] && PARTS="${PARTS}, ${FIX_COUNT} bug fix$([ $FIX_COUNT   -gt 1 ] && echo es)"
            [ "$OTHER_COUNT" -gt 0 ] && PARTS="${PARTS}, ${OTHER_COUNT} other improvement$([ $OTHER_COUNT -gt 1 ] && echo s)"
            PARTS="${PARTS#, }"  # strip leading ", "
            SUMMARY="This release contains **${TOTAL} commit$([ $TOTAL -gt 1 ] && echo s)** ${RANGE_DISPLAY}"
            [ -n "$PARTS" ] && SUMMARY="${SUMMARY} — including ${PARTS}."  || SUMMARY="${SUMMARY}."
          fi

          # ── Fetch referenced issues from GitHub API ────────────────────────────
          ISSUES_MD=""
          for NUM in $(echo "$ISSUE_NUMS" | tr ' ' '\n' | sort -un | grep -E '^[0-9]+$'); do
            ROW=$(gh api "repos/${REPO}/issues/${NUM}" \
              --jq '"| [#\(.number) — \(.title)](https://github.com/'${REPO}'/issues/\(.number)) | \(.state) |"' \
              2>/dev/null || true)
            [ -n "$ROW" ] && ISSUES_MD="${ISSUES_MD}${ROW}\n"
          done

          # ── Write final release-notes.md ───────────────────────────────────────
          {
            echo "## 📦 MTRCS ${TAG}"
            echo ""
            echo "$SUMMARY"
            echo ""
            echo "### 🚀 Quick Install"
            echo ""
            echo "Download the binary for your platform below and make it executable:"
            echo ""
            echo '```bash'
            echo '# Linux / macOS'
            echo 'chmod +x mtrcs'
            echo 'sudo mv mtrcs /usr/local/bin/'
            echo 'mtrcs --version'
            echo ''
            echo '# Windows — run from any PowerShell or cmd prompt'
            echo '.\mtrcs.exe --version'
            echo '```'
            echo ""
            echo "### 📋 Platform Downloads"
            echo ""
            echo "| Platform | File | Notes |"
            echo "|----------|------|-------|"
            echo "| Windows x64 | \`mtrcs-${TAG}-win-x64.zip\` | Native AOT |"
            echo "| macOS Apple Silicon | \`mtrcs-${TAG}-osx-arm64.tar.gz\` | Native AOT |"
            echo "| Linux x64 | \`mtrcs-${TAG}-linux-x64.tar.gz\` | Native AOT |"
            echo "| Linux ARM64 | \`mtrcs-${TAG}-linux-arm64.tar.gz\` | Native AOT |"
            echo "| Raspberry Pi (ARMv7) | \`mtrcs-${TAG}-linux-arm.tar.gz\` | Self-contained |"
            echo ""
            echo "### 🔐 Verify Your Download (SHA-256)"
            echo ""
            echo "A \`checksums.sha256.txt\` file is attached to this release. Verify the integrity of your download:"
            echo ""
            echo '```bash'
            echo "# Linux / macOS — download checksums.sha256.txt and your artifact into the"
            echo "# same directory, then verify the specific file you downloaded:"
            echo "grep \"mtrcs-${TAG}-linux-x64.tar.gz\" checksums.sha256.txt | sha256sum --check"
            echo ""
            echo "# Windows (PowerShell)"
            echo "\$expected = (Select-String \"win-x64\" checksums.sha256.txt).Line.Split(' ')[0]"
            echo "\$actual   = (Get-FileHash mtrcs-${TAG}-win-x64.zip -Algorithm SHA256).Hash.ToLower()"
            echo 'if ($actual -eq $expected) { "✅ Checksum OK" } else { "❌ Checksum MISMATCH" }'
            echo '```'
            echo ""
            echo "### ⚙️ Requirements"
            echo ""
            echo "- **Linux**: No runtime needed (self-contained binary)"
            echo "- **macOS**: No runtime needed — may require \`xattr -d com.apple.quarantine ./mtrcs\` on first run"
            echo "- **Windows**: May require running as Administrator for raw ICMP sockets"
            echo "- **Raspberry Pi**: May need \`sudo\` for ICMP probes"
            echo ""
            echo "### 📝 Commits ${RANGE_DISPLAY}"
            echo ""
            if [ -n "$COMMITS_MD" ]; then
              printf '%b' "$COMMITS_MD"
            else
              echo "*(No commits found in this range)*"
            fi
            echo ""
            if [ -n "$ISSUES_MD" ]; then
              echo "### 🔗 Related Issues"
              echo ""
              echo "| Issue | Status |"
              echo "|-------|--------|"
              printf '%b' "$ISSUES_MD"
              echo ""
            fi
            echo "---"
            echo "> Built from commit \`${{ github.sha }}\` · Build #${{ github.run_number }}"
          } > release-notes.md

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "MTRCS ${{ steps.version.outputs.tag }}"
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(steps.version.outputs.version, '-') }}
          files: dist/*
          fail_on_unmatched_files: false
          generate_release_notes: false
          make_latest: ${{ !contains(steps.version.outputs.version, '-') }}
