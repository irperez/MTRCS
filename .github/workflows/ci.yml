name: CI

on:
  push:
    branches: [ "main", "master" ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: [ "main", "master" ]
    paths-ignore:
      - "**.md"
      - "LICENSE"
      - ".gitignore"

env:
  DOTNET_NOLOGO: true
  DOTNET_SKIP_FIRST_TIME_EXPERIENCE: true
  DOTNET_CLI_TELEMETRY_OPTOUT: true

jobs:
  build-and-test:
    name: Build & Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-14 ]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Native AOT on Linux requires clang
      - name: Install native AOT prerequisites (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get update -y && sudo apt-get install -y clang zlib1g-dev

      - name: Restore dependencies
        working-directory: MTRCSLib
        run: dotnet restore MTRCSLib.slnx

      - name: Build
        working-directory: MTRCSLib
        run: >
          dotnet build MTRCSLib.slnx
          --configuration Release
          --no-restore
          -p:Version=1.0.0-build.${{ github.run_number }}

      - name: Test
        working-directory: MTRCSLib
        run: >
          dotnet test MTRCSLib.slnx
          --configuration Release
          --no-build
          --logger "console;verbosity=normal"
